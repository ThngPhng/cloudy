  <footer class="site-footer">
    <p>how do one write something about themself?</p>
  </footer>

  <script>
    const canvas = document.querySelector('.iceberg-canvas');
    let scale = 1;

    window.addEventListener('wheel', (e) => {
      if (e.ctrlKey) {
        e.preventDefault();
        
        const zoomFactor = 0.05;
        if (e.deltaY < 0) {
          scale = Math.min(scale + zoomFactor, 2);
        } else {
          scale = Math.max(scale - zoomFactor, 0.4);
        }

        canvas.style.setProperty('--zoom-scale', scale);
      }
    }, { passive: false });
  </script>
</body>
