name: Deploy to Nekoweb
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Nekoweb
        uses: oceanthunder/deploy2nekoweb@v1.1
        with:
          api_key: ${{ secrets.NEKOWEB_API_KEY }}
          dir: '.'
